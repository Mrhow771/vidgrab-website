<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradDown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <filter id="dropShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00f2fe" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Arrow body -->
  <line x1="32" y1="12" x2="32" y2="44" stroke="url(#gradDown)" stroke-width="8" stroke-linecap="round" filter="url(#dropShadow2)"/>
  <!-- Arrow head -->
  <polyline points="20,32 32,46 44,32" stroke="url(#gradDown)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow2)"/>
  <!-- Base line -->
  <line x1="16" y1="56" x2="48" y2="56" stroke="url(#gradDown)" stroke-width="8" stroke-linecap="round" filter="url(#dropShadow2)"/>
  <!-- Light reflection highlight -->
  <line x1="32" y1="14" x2="32" y2="24" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
