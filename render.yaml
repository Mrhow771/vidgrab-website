services:
  - type: web
    name: vidgrab-backend
    env: node
    rootDir: server
    buildCommand: npm install && chmod +x render-build.sh && ./render-build.sh
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: ./database.sqlite

  - type: web
    name: vidgrab-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://vidgrab-backend.onrender.com
