services:
  - type: web
    name: vidgrab-backend
    env: node
    rootDir: server
    buildCommand: npm install && chmod +x render-build.sh && ./render-build.sh
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /opt/database/database.sqlite
    disk:
      name: database-disk
      mountPath: /opt/database
      sizeGB: 1

  - type: web
    name: vidgrab-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://${vidgrab-backend.host}
